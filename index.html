<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />

  <title>Schnellangebot – Kallwaß</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #e8e0d0; font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; padding: 24px 16px; }
    .wrap { max-width: 680px; margin: 0 auto; }
    .label { font-size: 11px; letter-spacing: 0.15em; color: #B8963E; text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-size: 26px; font-weight: 600; color: #e8e0d0; }
    .sub { color: #888; font-size: 14px; margin-top: 6px; margin-bottom: 28px; }
    textarea {
      width: 100%; min-height: 110px; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 14px 16px; color: #e8e0d0; font-size: 15px;
      resize: vertical; outline: none; line-height: 1.5; font-family: inherit;
    }
    textarea:focus { border-color: #B8963E; }
    .hint { font-size: 12px; color: #555; margin-top: 6px; margin-bottom: 12px; }
    button.primary {
      width: 100%; padding: 14px; background: #B8963E; color: #0f0f0f;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-bottom: 28px; transition: opacity 0.2s;
    }
    button.primary:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
    .error { background: #2a1010; border: 1px solid #5a2020; border-radius: 12px; padding: 16px; margin-bottom: 24px; color: #ff8080; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; overflow: hidden; }
    .card-head { padding: 20px 24px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
    .card-head .meta { font-size: 11px; color: #B8963E; letter-spacing: 0.1em; text-transform: uppercase; }
    .card-head .date { font-size: 13px; color: #666; margin-top: 2px; }
    button.copy { background: #2a2a2a; border: 1px solid #333; border-radius: 8px; padding: 8px 14px; color: #aaa; font-size: 13px; cursor: pointer; }
    .pos { padding: 12px 24px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #1f1f1f; }
    .pos-name { font-size: 14px; color: #e8e0d0; }
    .pos-notiz { font-size: 12px; color: #666; margin-top: 2px; }
    .pos-preis { font-size: 14px; color: #B8963E; font-weight: 500; white-space: nowrap; padding-left: 16px; }
    .total { padding: 16px 24px; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .total-label { font-size: 15px; font-weight: 600; }
    .total-preis { font-size: 22px; font-weight: 700; color: #B8963E; }
    .hinweis { padding: 12px 24px; border-top: 1px solid #1f1f1f; font-size: 13px; color: #666; font-style: italic; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #555; border-top-color: #B8963E; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="label">Bestattungshaus Kallwaß</div>

  <p class="sub">Beschreibe die gewünschte Bestattung – das Angebot wird automatisch erstellt.</p>

  <textarea id="input" placeholder="z.B. Bundle MS Altefähr mit Natursarg, Abholung aus dem Krankenhaus, Rednerin Günther, Kühlung"></textarea>
  <p class="hint">Tipp: Mikrofon-Taste auf der Tastatur nutzen und einfach sprechen</p>
  <button class="primary" id="btn" onclick="generate()">Angebot erstellen</button>

  <div id="error" class="error" style="display:none"></div>
  <div id="result"></div>
</div>

const SYSTEM_PROMPT = `Du bist ein Angebotsassistent für das Bestattungshaus Kallwaß in Stralsund. 
Wähle passende Produkte aus der Preisliste basierend auf der Beschreibung.

Antworte NUR mit reinem JSON ohne Markdown oder Erklärungen:
{"positionen":[{"id":123,"name":"Produktname","preis":1234.56,"menge":1,"notiz":"optional"}],"hinweis":"Kurze Anmerkung"}

Regeln:
- Nur Produkte aus der Preisliste verwenden
- Natursarg = Bio Franka Esche
- Rednerin Günther = Rednerin Frau Günther
- MS Altefähr = passende Schiffsvariante je nach Angehörigen
- Bei Seebestattung: Vorbereitung und Begleitung Trauerfeier und Seebestattung hinzufügen`;

async function generate() {
  const input = document.getElementById("input").value.trim();
  if (!input) return;

  const btn = document.getElementById("btn");
  const errorDiv = document.getElementById("error");
  const result = document.getElementById("result");

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Angebot wird erstellt…';
  errorDiv.style.display = "none";
  result.innerHTML = "";

  const produktliste = PRODUCTS.map(p => `${p.name} | ${p.typ} | ${p.preis.toFixed(2)}€`).join("\n");

  try {
    const response = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        system: SYSTEM_PROMPT + "\n\nProduktliste:\n" + produktliste,
        messages: [{ role: "user", content: input }],
      }),
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data?.error?.message || `API Fehler ${response.status}`);
    }

    const text = data.content?.[0]?.text || "";
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("Kein gültiges Angebot erhalten");
    const angebot = JSON.parse(jsonMatch[0]);

    renderAngebot(angebot);
  } catch (e) {
    errorDiv.textContent = "Fehler: " + e.message;
    errorDiv.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Angebot erstellen";
  }
}

function fmt(n) { return n.toFixed(2).replace(".", ",") + " €"; }

function renderAngebot(angebot) {
  const gesamt = angebot.positionen.reduce((s, p) => s + p.preis * (p.menge || 1), 0);
  const datum = new Date().toLocaleDateString("de-DE");

  const rows = angebot.positionen.map(p => `
    <div class="pos">
      <div>
        <div class="pos-name">${p.name}${p.menge > 1 ? ` <span style="color:#666;font-size:12px">×${p.menge}</span>` : ""}</div>
        ${p.notiz ? `<div class="pos-notiz">${p.notiz}</div>` : ""}
      </div>
      <div class="pos-preis">${fmt(p.preis * (p.menge || 1))}</div>
    </div>
  `).join("");

  const copyText = angebot.positionen.map(p =>
    `${p.name}${p.menge > 1 ? ` ×${p.menge}` : ""}: ${fmt(p.preis * (p.menge || 1))}`
  ).join("\n") + `\n\nGesamt: ${fmt(gesamt)}`;

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="meta">Angebot</div>
          <div class="date">${datum}</div>
        </div>
        <button class="copy" onclick="navigator.clipboard.writeText(\`${copyText.replace(/`/g, "\\`")}\`)">Kopieren</button>
      </div>
      ${rows}
      <div class="total">
        <div class="total-label">Gesamt</div>
        <div class="total-preis">${fmt(gesamt)}</div>
      </div>
      ${angebot.hinweis ? `<div class="hinweis">${angebot.hinweis}</div>` : ""}
    </div>
  `;
}

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.metaKey) generate();
});
</script>
</body>
</html>
