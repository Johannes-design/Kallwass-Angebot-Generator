<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Schnellangebot – Kallwaß</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #e8e0d0; font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; padding: 24px 16px; }
    .wrap { max-width: 700px; margin: 0 auto; }
    .header-label { font-size: 11px; letter-spacing: 0.15em; color: #B8963E; text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-size: 24px; font-weight: 600; color: #e8e0d0; }
    .sub { color: #888; font-size: 14px; margin-top: 6px; margin-bottom: 20px; }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .qbtn { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 7px 14px; color: #aaa; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .qbtn:hover, .qbtn.active { background: #B8963E22; border-color: #B8963E; color: #B8963E; }
    textarea { width: 100%; min-height: 90px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; color: #e8e0d0; font-size: 15px; resize: vertical; outline: none; line-height: 1.5; font-family: inherit; }
    textarea:focus { border-color: #B8963E55; }
    .hint { font-size: 12px; color: #555; margin-top: 6px; margin-bottom: 14px; }
    button.primary { width: 100%; padding: 14px; background: #B8963E; color: #0f0f0f; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 28px; }
    button.primary:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
    .error { background: #2a1010; border: 1px solid #5a2020; border-radius: 12px; padding: 16px; margin-bottom: 24px; color: #ff8080; font-size: 14px; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; overflow: hidden; }
    .card-head { padding: 18px 22px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
    .card-meta { font-size: 11px; color: #B8963E; letter-spacing: 0.1em; text-transform: uppercase; }
    .card-date { font-size: 13px; color: #666; margin-top: 2px; }
    button.copy { background: #2a2a2a; border: 1px solid #333; border-radius: 8px; padding: 8px 14px; color: #aaa; font-size: 13px; cursor: pointer; }
    .section-label { padding: 8px 22px 4px; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; background: #161616; }
    .pos { padding: 11px 22px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #1e1e1e; }
    .pos-left { flex: 1; padding-right: 12px; }
    .pos-name { font-size: 14px; color: #e8e0d0; line-height: 1.3; }
    .pos-notiz { font-size: 12px; color: #666; margin-top: 2px; }
    .pos-price { font-size: 14px; color: #B8963E; font-weight: 500; white-space: nowrap; }
    .pos-price.null { color: #555; }
    .total-row { padding: 16px 22px; border-top: 2px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
    .total-label { font-size: 15px; font-weight: 600; }
    .total-price { font-size: 22px; font-weight: 700; color: #B8963E; }
    .hinweis { padding: 12px 22px; border-top: 1px solid #1e1e1e; font-size: 13px; color: #666; font-style: italic; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #B8963E; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tag { display: inline-block; background: #B8963E22; color: #B8963E; border-radius: 4px; padding: 2px 7px; font-size: 11px; margin-left: 6px; vertical-align: middle; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header-label">Bestattungshaus Kallwaß</div>
  <h1>Schnellangebot</h1>
  <p class="sub">Beschreibe die Bestattung – das Angebot wird automatisch erstellt.</p>

  <div class="quick-btns">
    <button class="qbtn" onclick="setTemplate('see')">🌊 Seebestattung</button>
    <button class="qbtn" onclick="setTemplate('urne')">🏛️ Urne Stralsund</button>
    <button class="qbtn" onclick="setTemplate('erde')">🌿 Erdbestattung</button>
    <button class="qbtn" onclick="setTemplate('friedwald')">🌳 FriedWald</button>
  </div>

  <textarea id="input" placeholder="z.B. Seebestattung MS Sundevit, Kiefersarg Natur, Abholung Helios Krankenhaus tagsüber, Rednerin Jana Günther, 30 Angehörige, Essen an Bord"></textarea>
  <p class="hint">💡 Tipp: Mikrofon-Taste auf der Tastatur nutzen und einfach sprechen</p>
  <button class="primary" id="btn" onclick="generate()">Angebot erstellen</button>

  <div id="error" class="error" style="display:none"></div>
  <div id="result"></div>
</div>

function setTemplate(type) {
  document.getElementById('input').value = TEMPLATES[type];
  document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

const SYSTEM_PROMPT = `Du bist ein Angebotsassistent für das Bestattungshaus Kallwaß in Stralsund.

Antworte NUR mit reinem JSON ohne Markdown:

async function generate() {
  const input = document.getElementById('input').value.trim();
  if (!input) return;
  const btn = document.getElementById('btn');
  const errorDiv = document.getElementById('error');
  const result = document.getElementById('result');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Angebot wird erstellt…';
  errorDiv.style.display = 'none';
  result.innerHTML = '';

  try {
    const response = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: input }]
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data?.error?.message || `Fehler ${response.status}`);
    const text = data.content?.[0]?.text || '';
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Kein gültiges Angebot erhalten');
    const angebot = JSON.parse(match[0]);
    renderAngebot(angebot);
  } catch(e) {
    errorDiv.textContent = 'Fehler: ' + e.message;
    errorDiv.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Angebot erstellen';
  }
}

function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

function renderAngebot(angebot) {
  const positionen = angebot.positionen || [];
  const eigen = positionen.filter(p => p.kat !== 'a');
  const auslagen = positionen.filter(p => p.kat === 'a');
  const gesamt = positionen.reduce((s, p) => s + (p.preis || 0) * (p.menge || 1), 0);
  const datum = new Date().toLocaleDateString('de-DE');
  const btypLabels = { see: '🌊 Seebestattung', urne: '🏛️ Urne Stralsund', erde: '🌿 Erdbestattung', friedwald: '🌳 FriedWald' };

  const copyText = `Angebot Bestattungshaus Kallwaß · ${datum}\n\n` +
    (eigen.length ? 'Eigenleistungen:\n' + eigen.map(p => `${p.name}: ${fmt((p.preis||0)*(p.menge||1))}`).join('\n') + '\n\n' : '') +
    (auslagen.length ? 'Verauslagte Kosten:\n' + auslagen.map(p => `${p.name}: ${fmt((p.preis||0)*(p.menge||1))}`).join('\n') + '\n\n' : '') +
    `Gesamt netto: ${fmt(gesamt)}`;

  const renderRows = items => items.map(p => `
    <div class="pos">
      <div class="pos-left">
        <div class="pos-name">${p.name}${p.menge > 1 ? `<span style="color:#666;font-size:12px"> ×${p.menge}</span>` : ''}</div>
        ${p.notiz ? `<div class="pos-notiz">${p.notiz}</div>` : ''}
      </div>
      <div class="pos-price${(p.preis||0) === 0 ? ' null' : ''}">${(p.preis||0) === 0 ? '—' : fmt((p.preis||0)*(p.menge||1))}</div>
    </div>`).join('');

  document.getElementById('result').innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-meta">Angebot ${btypLabels[angebot.typ] ? `<span class="tag">${btypLabels[angebot.typ]}</span>` : ''}</div>
          <div class="card-date">${datum}</div>
        </div>
        <button class="copy" onclick="navigator.clipboard.writeText(\`${copyText.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)">Kopieren</button>
      </div>
      ${eigen.length ? `<div class="section-label">Eigenleistungen</div>${renderRows(eigen)}` : ''}
      ${auslagen.length ? `<div class="section-label">Verauslagte Kosten</div>${renderRows(auslagen)}` : ''}
      <div class="total-row">
        <div class="total-label">Gesamt netto</div>
        <div class="total-price">${fmt(gesamt)}</div>
      </div>
      ${angebot.hinweis ? `<div class="hinweis">${angebot.hinweis}</div>` : ''}
    </div>`;
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.metaKey) generate();
});
</script>
